# GENERATED — structure matches the clickhouse chart's authoritative users block.
# NOTE: the application databases (metrics, budeval, budgateway) are created by
# the owning services at startup (budmetrics scripts/migrate_clickhouse.py,
# budeval migrations, budgateway clickhouse/mod.rs) — NOT by the chart's
# db-create job. The job only provisions the `bud` user + grants.
#
# The `databases:` list was removed: it made the job emit a broken
# `CREATE DATABASE metrics ENGINE = Replicated('.../{{ . }}', ...)` — the
# `{{ . }}` is a literal, un-rendered Helm string, so ClickHouse fails with
# macro error 139. Grants are by name and do not need the DB to exist yet.
users:
  bud:
    password: "O5PofEAoLkw765GmxzMLx85VlMYaN0KI"
    grants:
      - ALL ON metrics.*
      - SELECT(path) ON system.zookeeper
      - SELECT(cluster, replica_num) ON system.clusters
      - SELECT(macro, substitution) ON system.macros
