# SECRETS TEMPLATE for the `bud` chart — placeholders only.
#
# DO NOT commit real secrets to a public repo. To use:
#   1. Copy this file to `secrets.yaml` (gitignored in this repo).
#   2. Replace every GENERATED_* placeholder with a real value.
#   3. Commit `secrets.yaml` to YOUR PRIVATE fork (or encrypt it with SOPS +
#      the helm-secrets ArgoCD plugin — optional hardening).
#
# The chart renders these into Kubernetes Secrets, so the values DO need to
# travel in the values stream. Generate randoms with, e.g.:
#   tr -dc 'A-Za-z0-9' </dev/urandom | head -c 32
#
# Because the databases run IN-CLUSTER (via cluster-addons), each password below
# must MATCH the password the corresponding addon provisions its user with.
# Set each one once and use the same value in both places.

registries:
  registry.bud.studio:
    username: "robot$yourname" # the robot account issued to you by Bud
    password: "REGISTRY_TOKEN_FROM_BUD" # the robot token

appApiToken: "GENERATED_32_CHAR"

microservices:
  rsaKeys:
    privateKeyPassword: "GENERATED_32_CHAR"
    privateKey: "GENERATED_RSA_PEM" # openssl genrsa -aes256 -out private_key.pem 2048
  global:
    env:
      SUPER_USER_EMAIL: "admin@example.com" # first admin login
      SUPER_USER_PASSWORD: "GENERATED" # first admin login
      PASSWORD_SALT: "GENERATED"
  budapp:
    env:
      AES_KEY_HEX: "GENERATED" # encrypts stored credentials

externalServices:
  postgresql:
    databases:
      keycloak: { username: keycloak, password: "GENERATED" }
      budapp: { username: budapp, password: "GENERATED" }
      budcluster: { username: budcluster, password: "GENERATED" }
      budmetrics: { username: budmetrics, password: "GENERATED" }
      budmodel: { username: budmodel, password: "GENERATED" }
      budsim: { username: budsim, password: "GENERATED" }
      budeval: { username: budeval, password: "GENERATED" }
      budask: { username: budask, password: "GENERATED" }
  clickhouse:
    auth: { username: bud, password: "GENERATED" }
  kafka:
    auth: { username: bud, password: "GENERATED" }
  mongodb:
    auth: { username: bud, password: "GENERATED" }
  valkey:
    password: "GENERATED"
  s3:
    auth: { accessKey: "GENERATED", secretKey: "GENERATED" }
  # OIDC: pre-create the OAuth clients in your IdP and paste the secrets here.
  oidc:
    clients:
      mcpgateway: { secret: "GENERATED" }
  keycloak:
    clients:
      mcpgateway: { secret: "GENERATED" }
