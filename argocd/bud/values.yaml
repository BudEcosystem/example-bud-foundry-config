# Non-secret configuration for the `bud` platform chart.
# This is the whole file you hand-edit. Everything not set here falls back to
# the chart's built-in defaults — including the in-cluster database hosts
# (pooler-rw.postgres, clickhouse-clickhouse.clickhouse, mongodb-rs0.mongodb,
# valkey-master.valkey), which you should NOT override when using cluster-addons.

global:
  ingress:
    hosts:
      # Set ONLY this. budadmin/budapp/budgateway/... hostnames are derived from
      # root by the chart helpers (admin.<root>, gateway.<root>, app.<root>, ...).
      # Temporary test domain; a *.deploy-test.bud.studio wildcard cert covers the
      # single-level sub-hosts. NOTE: novu uses two-level hosts (api.novu.<root>,
      # ws.novu.<root>) which a single-level wildcard does NOT cover — set
      # global.ingress.hosts.novuapi / novuws explicitly if you need TLS on those.
      root: "deploy-test.bud.studio"

ingress:
  enabled: true
  # 'internal' = cert-manager issues + Traefik terminates TLS in-cluster. This is
  # what emits the `kubernetes.io/tls-acme: "true"` annotation that triggers
  # cert-manager. 'external' assumes an upstream LB/WAF terminates TLS and issues
  # NO certs in-cluster (Traefik serves a self-signed fallback -> browser warning).
  # 'disabled' = plain HTTP.
  https: internal # external | internal | disabled
  className: "traefik" # your cluster's ingress class
  # NOTE: with 'internal', certs are issued via cert-manager's ingress-shim
  # default ClusterIssuer (letsencrypt-http01, installed by the cert-manager-issuer
  # addon). That issuer uses the HTTP-01 challenge, so every ingress host
  # (admin.<root>, app.<root>, gateway.<root>, ...) must be PUBLICLY resolvable and
  # reachable on :80 for Let's Encrypt to validate. The clusterIssuer key below is
  # NOT consumed by this chart (the ingress only emits tls-acme) — left for reference.
  clusterIssuer: "letsencrypt-http01"

# Storage classes are cluster-specific and have NO safe default — set them.
storage:
  budmodelRegistry:
    className: "local-path" # MUST match a StorageClass in your cluster (e.g. "managed-csi")
    size: 300Gi # bump for larger models (chart note: ~1Ti for >20B params)
  budmodelAddDir:
    className: "local-path"
  budevalDataset:
    className: "local-path"
  budappStaticDir:
    className: "local-path"

# OIDC issuer — budapp's OIDC_ISSUER + the browser login redirect + the token
# `iss` claim all come from this. MUST equal the public Keycloak ingress host set
# in argocd/keycloak/values.yaml (ingress.host) + "/realms/bud-keycloak".
# Default in the chart is the placeholder http://auth.bud.lan/... — override it:
externalServices:
  oidc:
    url: "https://auth2.deploy-test.bud.studio/realms/bud-keycloak"

# Optional: pin replica counts / HPA bounds to your capacity.
# microservices:
#   budapp:
#     autoscaling: { minReplicas: 2, maxReplicas: 6 }
