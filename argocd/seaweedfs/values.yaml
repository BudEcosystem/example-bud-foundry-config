# argocd/seaweedfs/values.yaml — SeaweedFS config for the single seaweedfs app
# (chart 0.4.0). Loaded via $values/argocd/seaweedfs/values.yaml by the
# cluster-addons ApplicationSet.
#
# Single-app deployment: the chart default createCluster=true renders the
# operator + Seaweed CR + buckets + S3Identity together, so do NOT set
# createCluster here. (The earlier operator/cluster split that toggled
# createCluster per-app is no longer used.)

# Single-node sizing (this is a single-worker test cluster). master uses Raft —
# keep it ODD (1 or 3, never 2). defaultReplication "000" = no data replication,
# so one volume server is enough.
replicas:
  master: 1
  filer: 1
  volume: 1
  s3: 1
  worker: 1
defaultReplication: "000"

# S3 ingress for EXTERNAL access. budapp/budmodel reach S3 over internal DNS
# (seaweed-s3.seaweedfs:8333) and do NOT need this — set enabled: false if you
# don't need an external S3 endpoint. Host must be public on :80 for the
# HTTP-01 ACME challenge if https: true.
ingress:
  enabled: true
  https: true
  host: s3.deploy-test.bud.studio

# Buckets consumed by the platform. User "bud" matches
# externalServices.s3.auth in argocd/bud/values.yaml.
buckets:
  bud-novu:
    reclaimPolicy: Delete
    versioning: "Off"
    objectLock: false
    anonymousRead: false
    quota:
      size: 1Gi
      enforce: true
    access:
      - user: bud
        actions: [Read, Write, List]
  bud-model-info:
    reclaimPolicy: Delete
    versioning: "Off"
    objectLock: false
    anonymousRead: false
    quota:
      size: 1Gi
      enforce: true
    access:
      - user: bud
        actions: [Read, Write, List]
  bud-models-registry:
    reclaimPolicy: Delete
    versioning: "Off"
    objectLock: false
    anonymousRead: false
    quota:
      size: 60Gi
      enforce: true
    access:
      - user: bud
        actions: [Read, Write, List]
