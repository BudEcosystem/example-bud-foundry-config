# cluster-addons ApplicationSet — the required in-cluster dependencies of Bud Foundry.
#
# Deploys dapr, cert-manager, postgres, clickhouse, kafka, mongodb, valkey and
# seaweedfs from the OCI chart registry. Each Application pulls its chart from
# registry.bud.studio/charts and its config from THIS repo via the $values
# reference (see the second source below).
#
# OPTIONAL add-ons (storage provisioning, observability) are NOT included here —
# they depend on your cluster and needs. See the Installation Guide:
# https://docs.budecosystem.com/developer-docs/installation
#   - openebs : only if your cluster has no StorageClass (e.g. bare metal).
#               Managed clusters already provide one — skip it.
#   - otel    : OpenTelemetry operator + node collector for cluster/infra metrics.
#               The platform ships its OWN app-telemetry collector, so this is
#               only for infra-level observability.
#   - signoz  : observability dashboards UI. Nothing depends on it.
#
# BEFORE APPLYING:
#   1. Fork this repo (or copy it into your own git repo).
#   2. Set `repoURL` on the `ref: values` source to YOUR fork's URL.
#   3. Fill in argocd/bud/values.yaml etc. with your settings.
#
# NOTE: all per-app SeaweedFS specifics live in the templatePatch block at the
# bottom, NOT inline in `template` — bare {{ if }} control flow inside a YAML
# list breaks `kubectl apply` (the ApplicationSet renders fine, but kubectl
# parses raw YAML first). templatePatch is an opaque string, so it stays valid.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-addons
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: dapr
            namespace: dapr-system
          - name: cert-manager
            namespace: cert-manager
          # Creates the letsencrypt-http01 ClusterIssuer that cert-manager's
          # ingress-shim defaults to. REQUIRED when ingress.https=internal — without
          # it every *-acme-cert stays Ready=False ("ClusterIssuer letsencrypt-http01
          # not found"). HTTP-01 solver via traefik, so hosts must be public on :80.
          - name: cert-manager-issuer
            namespace: cert-manager
          - name: postgres
            namespace: postgres
          - name: clickhouse
            namespace: clickhouse
          - name: kafka
            namespace: kafka
          - name: mongodb
            namespace: mongodb
          - name: valkey
            namespace: valkey
          # SeaweedFS is split into two Applications to break a cold-start
          # deadlock: the operator's admission webhook rejects the Seaweed CR
          # until its caBundle is patched, but that patch runs as a PostSync
          # hook that only fires after a successful Sync. The "seaweedfs" app
          # deploys the operator alone (createCluster=false) so its Sync
          # succeeds and PostSync patches the caBundle; "seaweedfs-cluster"
          # (operator disabled, createCluster=true) then has its CR admitted.
          # Both apps use the SAME chart + config folder (argocd/seaweedfs/).
          # See the templatePatch block below for the per-app wiring.
          - name: seaweedfs
            namespace: seaweedfs
          - name: seaweedfs-cluster
            namespace: seaweedfs
  template:
    metadata:
      name: "{{.name}}"
    spec:
      project: bud-foundry
      sources:
        # 1) The chart, pulled from the OCI registry (no source-repo access needed).
        #    The two seaweedfs apps override chart/version/params/valueFiles via
        #    templatePatch below (they reuse the "seaweedfs" chart + config).
        - repoURL: registry.bud.studio/charts
          chart: "{{.name}}"
          targetRevision: "0.1.0" # dependency charts are versioned at 0.1.0
          helm:
            releaseName: "{{.name}}"
            # $values resolves to the ROOT of the ref source below, so the path
            # includes the `argocd/` folder these files live in. secrets.yaml is
            # produced by scripts/gen-secrets.sh for the stateful addons
            # (postgres/clickhouse/kafka/mongodb/valkey); addons without one
            # (dapr, cert-manager) skip it via ignoreMissingValueFiles.
            valueFiles:
              - "$values/argocd/{{.name}}/values.yaml"
              - "$values/argocd/{{.name}}/secrets.yaml"
            ignoreMissingValueFiles: true
        # 2) This config repo. POINT repoURL AT YOUR FORK.
        - repoURL: https://github.com/BudEcosystem/example-bud-foundry-config
          targetRevision: main
          ref: values
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "{{.namespace}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        automated:
          selfHeal: true
  # Per-app overrides for the SeaweedFS split. templatePatch is applied as an
  # RFC 7386 JSON Merge Patch: a null key DELETES it and lists are REPLACED
  # wholesale. So for the 12 non-seaweedfs apps the patch MUST render to exactly
  # `{}` (a no-op) — emitting `spec.sources: null` (or empty) would delete their
  # sources. Everything is keyed off .name (always present), safe under
  # goTemplateOptions missingkey=error.
  templatePatch: |
    {{- if or (eq .name "seaweedfs") (eq .name "seaweedfs-cluster") }}
    spec:
      # The whole sources list is REPLACED for the two seaweedfs apps: they use
      # the seaweedfs chart v0.2.0 (createCluster toggle) + argocd/seaweedfs/
      # config; releaseName stays "seaweedfs" so resource names are stable.
      sources:
        - repoURL: registry.bud.studio/charts
          chart: "seaweedfs"
          targetRevision: "0.4.0"
          helm:
            releaseName: "seaweedfs"
            {{- if eq .name "seaweedfs-cluster" }}
            # Cluster resources only; reuse the operator app's CRDs + webhook.
            parameters:
              - name: "createCluster"
                value: "true"
              - name: "seaweedfs-operator.enabled"
                value: "false"
            {{- else }}
            # Operator only; the Seaweed CR ships in seaweedfs-cluster.
            parameters:
              - name: "createCluster"
                value: "false"
            {{- end }}
            valueFiles:
              - "$values/argocd/seaweedfs/values.yaml"
              - "$values/argocd/seaweedfs/secrets.yaml"
            ignoreMissingValueFiles: true
        - repoURL: https://github.com/BudEcosystem/example-bud-foundry-config
          targetRevision: main
          ref: values
      {{- if eq .name "seaweedfs" }}
      # ArgoCD does not own the webhook caBundle (it is patched in by the
      # operator's PostSync cert job); ignore it so selfHeal never churns it.
      ignoreDifferences:
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          name: seaweedfs-seaweedfs-operator-mutating-webhook-configuration
          jqPathExpressions:
            - ".webhooks[].clientConfig.caBundle"
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          name: seaweedfs-seaweedfs-operator-validating-webhook-configuration
          jqPathExpressions:
            - ".webhooks[].clientConfig.caBundle"
      {{- end }}
    {{- else }}
    {}
    {{- end }}
