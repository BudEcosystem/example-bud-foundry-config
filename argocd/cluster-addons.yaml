# cluster-addons ApplicationSet — the required in-cluster dependencies of Bud Foundry.
#
# Deploys dapr, cert-manager, postgres, clickhouse, kafka, mongodb, valkey and
# seaweedfs from the OCI chart registry. Each Application pulls its chart from
# registry.bud.studio/charts and its config from THIS repo via the $values
# reference (see the second source below).
#
# OPTIONAL add-ons (storage provisioning, observability) are NOT included here —
# they depend on your cluster and needs. See the Installation Guide:
# https://docs.budecosystem.com/developer-docs/installation
#   - openebs : only if your cluster has no StorageClass (e.g. bare metal).
#               Managed clusters already provide one — skip it.
#   - otel    : OpenTelemetry operator + node collector for cluster/infra metrics.
#               The platform ships its OWN app-telemetry collector, so this is
#               only for infra-level observability.
#   - signoz  : observability dashboards UI. Nothing depends on it.
#
# BEFORE APPLYING:
#   1. Fork this repo (or copy it into your own git repo).
#   2. Set `repoURL` on the `ref: values` source to YOUR fork's URL.
#   3. Fill in argocd/bud/values.yaml etc. with your settings.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-addons
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          # Each element pins its chart version; targetRevision below renders
          # {{.version}}. Dependency charts are at 0.1.0; seaweedfs is bumped to
          # 0.4.0 (see its note).
          - name: dapr
            namespace: dapr-system
            version: "0.1.0"
          - name: cert-manager
            namespace: cert-manager
            version: "0.1.0"
          # Creates the letsencrypt-http01 ClusterIssuer that cert-manager's
          # ingress-shim defaults to. REQUIRED when ingress.https=internal — without
          # it every *-acme-cert stays Ready=False ("ClusterIssuer letsencrypt-http01
          # not found"). HTTP-01 solver via traefik, so hosts must be public on :80.
          - name: cert-manager-issuer
            namespace: cert-manager
            version: "0.1.0"
          - name: postgres
            namespace: postgres
            version: "0.1.0"
          - name: clickhouse
            namespace: clickhouse
            version: "0.1.0"
          - name: kafka
            namespace: kafka
            version: "0.1.0"
          - name: mongodb
            namespace: mongodb
            version: "0.1.0"
          - name: valkey
            namespace: valkey
            version: "0.1.0"
          # seaweedfs 0.4.0: single app (createCluster=true is the chart default,
          # so operator + Seaweed CR + buckets + S3Identity all render together).
          # 0.4.0 carries the s3identity.yaml template + operator 1.0.22 (which has
          # the S3 IAM controllers); 0.1.0 lacked both, so the `bud` access key was
          # never registered and model-upload S3 auth failed with InvalidAccessKeyId.
          # The `identities.bud` creds in argocd/seaweedfs/secrets.yaml are consumed
          # by this version to register the key.
          - name: seaweedfs
            namespace: seaweedfs
            version: "0.4.0"
  template:
    metadata:
      name: "{{.name}}"
    spec:
      project: bud-foundry
      sources:
        # 1) The chart, pulled from the OCI registry (no source-repo access needed).
        - repoURL: registry.bud.studio/charts
          chart: "{{.name}}"
          targetRevision: "{{.version}}" # per-element version (see generator list)
          helm:
            releaseName: "{{.name}}"
            # $values resolves to the ROOT of the ref source below, so the path
            # includes the `argocd/` folder these files live in. secrets.yaml is
            # produced by scripts/gen-secrets.sh for the stateful addons
            # (postgres/clickhouse/kafka/mongodb/valkey); addons without one
            # (dapr, cert-manager) skip it via ignoreMissingValueFiles.
            valueFiles:
              - "$values/argocd/{{.name}}/values.yaml"
              - "$values/argocd/{{.name}}/secrets.yaml"
            ignoreMissingValueFiles: true
        # 2) This config repo. POINT repoURL AT YOUR FORK.
        - repoURL: https://github.com/BudEcosystem/example-bud-foundry-config
          targetRevision: main
          ref: values
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "{{.namespace}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        automated:
          selfHeal: true
      # ArgoCD does NOT own the seaweedfs operator webhook caBundle — the operator
      # patches it in at runtime (cert-manager-free, self-signed CA generated by
      # the create-webhook-certificates hook). Without this, every sync resets
      # caBundle to empty, so the operator's CR admission webhook (mseaweed.kb.io)
      # rejects the Seaweed CR with "x509: certificate signed by unknown authority"
      # and the cluster never comes up. Only seaweedfs has these webhook configs;
      # the rule is a harmless no-op for the other addons.
      ignoreDifferences:
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          name: seaweedfs-seaweedfs-operator-mutating-webhook-configuration
          jqPathExpressions:
            - ".webhooks[].clientConfig.caBundle"
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          name: seaweedfs-seaweedfs-operator-validating-webhook-configuration
          jqPathExpressions:
            - ".webhooks[].clientConfig.caBundle"
  # Per-element chart versions are set via the `version` field on each generator
  # element (rendered by targetRevision: {{.version}}). seaweedfs is on 0.4.0 for
  # the S3Identity + operator 1.0.22 fix; all other addons stay at 0.1.0.
